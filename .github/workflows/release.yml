name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        strategy:
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      os: macos-latest
                    - target: x86_64-apple-darwin
                      os: macos-latest
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest

        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
            - name: Install cross-compile tools (Linux ARM64)
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: sudo apt-get install -y gcc-aarch64-linux-gnu
            - run: cargo build --release --target ${{ matrix.target }}
            - name: Package binary
              run: |
                  mkdir knap-${{ matrix.target }}
                  cp target/${{ matrix.target }}/release/knap knap-${{ matrix.target }}/
                  tar czf knap-${{ matrix.target }}.tar.gz knap-${{ matrix.target }}/
            - name: Upload to release
              uses: softprops/action-gh-release@v2
              with:
                  files: knap-${{ matrix.target }}.tar.gz
